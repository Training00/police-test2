<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Թեստ — Պարեկային ծառայության կանոնադրություն</title>
  <style>
    body {
      font-family: Arial, "Noto Sans Armenian", sans-serif;
      background: #f4f6f8;
      color: #1f2937;
      margin: 0;
      padding: 20px;
      line-height: 1.55;
    }
    .container {
      max-width: 980px;
      margin: 0 auto;
      background: white;
      border-radius: 14px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }
    h1 {
      text-align: center;
      margin-top: 0;
      color: #111827;
      font-size: 26px;
    }
    .note {
      color: #4b5563;
      font-size: 15px;
      text-align: center;
      margin-bottom: 18px;
    }
    .student {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 14px;
      margin: 20px 0;
    }
    label { font-weight: 700; }
    input[type="text"] {
      width: 100%;
      padding: 11px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      margin-top: 6px;
    }
    .question {
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 16px;
      margin: 14px 0;
      background: #ffffff;
    }
    .question h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .option {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 10px 12px;
      margin: 7px 0;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      cursor: pointer;
      user-select: none;
      font-weight: 400;
    }
    .option:hover { background: #f3f4f6; }
    .option input {
      margin-top: 4px;
      transform: scale(1.25);
      cursor: pointer;
    }
    .selected {
      background: #dbeafe !important;
      border-color: #2563eb;
    }
    .correct {
      background: #dcfce7 !important;
      border-left: 5px solid #16a34a;
    }
    .wrong {
      background: #fee2e2 !important;
      border-left: 5px solid #dc2626;
    }
    button {
      display: block;
      margin: 28px auto 16px;
      padding: 14px 28px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      background: #2563eb;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }
    #result {
      display: none;
      margin-top: 22px;
      padding: 18px;
      border-radius: 12px;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      font-size: 18px;
      text-align: center;
    }
    .pass { color: #15803d; font-weight: 800; }
    .fail { color: #b91c1c; font-weight: 800; }
    @media (max-width: 800px) {
      .student { grid-template-columns: 1fr; }
      .container { padding: 16px; }
      h1 { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Թեստ — ՀՀ ՆԳՆ ոստիկանության պարեկային ծառայության կանոնադրություն</h1>
    <p class="note">Յուրաքանչյուր ճիշտ պատասխան գնահատվում է 1 միավոր։ Ընդհանուր՝ 40 միավոր։ Թեստը հաղթահարված է 32 և ավելի միավորի դեպքում։</p>

    <div class="student">
      <label>Անուն
        <input type="text" id="firstName" placeholder="Մուտքագրեք անունը">
      </label>
      <label>Ազգանուն
        <input type="text" id="lastName" placeholder="Մուտքագրեք ազգանունը">
      </label>
      <label>Դասակ
        <input type="text" id="platoon" placeholder="Մուտքագրեք դասակը">
      </label>
    </div>

    <form id="quizForm"></form>

    <button id="submitBtn" type="button" onclick="submitQuiz()">Հանձնել թեստը</button>

    <div id="result"></div>
  </div>

  <script>
    // Եթե ցանկանում եք արդյունքները ուղարկել Google Sheets, այստեղ տեղադրեք Apps Script-ի /exec հղումը։
    // Օրինակ՝ const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwfd0c-KW39vHJS8c14uOZl9YU_kh41JGG9eWjLCrvrGwPnVP9sBSADE_uBd9aSEi1RSQ/exec";
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwfd0c-KW39vHJS8c14uOZl9YU_kh41JGG9eWjLCrvrGwPnVP9sBSADE_uBd9aSEi1RSQ/exec";

    const questions = [
      { q: "Համաձայն կանոնադրության 9-րդ կետի՝ Պարեկային ծառայության հիմնական նպատակներից ո՞րն է։", options: ["Դատական իշխանության իրականացումը", "Հասարակական կարգի պահպանությունը և հասարակական անվտանգության ապահովումը", "Համայնքային ծրագրերի իրականացումը", "Հարկերի հավաքագրումը"], answer: 1 },
      { q: "Համաձայն կանոնադրության 25-րդ կետի՝ պարեկային անձնակազմը ստանում է հաղորդում, որ փողոցում տեղի է ունենում ծեծկռտուք։ Ի՞նչ է պարտավոր անել։", options: ["Սպասել գրավոր դիմումի", "Տեղեկացնել միայն համայնքապետարանին", "Արձագանքել և ձեռնարկել համապատասխան միջոցներ", "Սպասել մինչև կողմերը հաշտվեն"], answer: 2 },
      { q: "Համաձայն կանոնադրության 17-րդ կետի՝ Պարեկային ծառայության պետն իրավասու է՝", options: ["Նշանակել դատավորներ", "Ընդունել օրենքներ", "Դատավճիռներ կայացնել", "Տալ կատարման ենթակա հանձնարարականներ"], answer: 3 },
      { q: "Համաձայն կանոնադրության 24-րդ կետի՝ վարչական ակտի վերաբերյալ ներկայացված բողոքը պետք է՝", options: ["Քննվի սահմանված կարգով", "Մերժվի առանց քննության", "Քննվի միայն դատարանի կողմից", "Ընդունվի միայն փաստաբանի միջոցով"], answer: 0 },
      { q: "Համաձայն կանոնադրության 29-րդ կետի՝ ճանապարհային երթևեկության անվտանգության ապահովման հիմնական նպատակը ո՞րն է։", options: ["Վարորդների թվի նվազեցումը", "Տուգանքների թվի ավելացումը", "Ճանապարհատրանսպորտային պատահարների կանխումը", "Ավտոմեքենաների ստուգումների ավելացումը"], answer: 2 },
      { q: "Համաձայն կանոնադրության 28-րդ կետի՝ պարեկը ծառայության ընթացքում հայտնաբերում է հետախուզվող անձի։ Ի՞նչ պետք է անի։", options: ["Անտեսի անձին", "Հանրայնացնի տեղեկությունը", "Սպասի հերթափոխի ավարտին", "Գործի սահմանված կարգով"], answer: 3 },
      { q: "Համաձայն կանոնադրության 10-րդ կետի՝ իրավախախտումների կանխարգելումը հանդիսանում է՝", options: ["Պարեկային ծառայության խնդիրներից մեկը", "Միայն քննիչների գործառույթ", "Միայն դատախազության գործառույթ", "Միայն դատարանի գործառույթ"], answer: 0 },
      { q: "Համաձայն կանոնադրության 23-րդ կետի՝ վարչական վարույթի համակարգման հիմնական նպատակն է՝", options: ["Դատական ակտերի կատարումը", "Վարչական վարույթների կազմակերպումն ու համակարգումը", "Քրեական գործերի քննությունը", "Տուգանքների քանակի ավելացումը"], answer: 1 },
      { q: "Համաձայն կանոնադրության 25-րդ կետի՝ զանգվածային միջոցառման ընթացքում առաջացել է լարված իրավիճակ։ Պարեկի առաջնային խնդիրն է՝", options: ["Կանխել իրավիճակի սրումը և պահպանել հասարակական կարգը", "Կազմել հնարավորինս շատ արձանագրություններ", "Դադարեցնել միջոցառումը", "Չմիջամտել"], answer: 0 },
      { q: "Համաձայն կանոնադրության 9-րդ կետի՝ ո՞ր վարքագիծն է առավել նպաստում ոստիկանության նկատմամբ վստահության ձևավորմանը։", options: ["Քաղաքացիների հետ շփումից խուսափելը", "Դիմումների սահմանափակումը", "Օրինական, անաչառ և հարգալից վերաբերմունքը", "Միայն վարչական տույժերի կիրառումը"], answer: 2 },
      { q: "Համաձայն կանոնադրության 21-րդ կետի՝ կազմակերպման վարչության հիմնական գործառույթն է՝", options: ["Բողոքների քննությունը", "Ծառայության գործունեության կազմակերպումն ու համակարգումը", "Քրեական գործերի քննությունը", "Հետախուզվող անձանց հայտնաբերումը"], answer: 1 },
      { q: "Համաձայն կանոնադրության 25-րդ կետի՝ քաղաքացին հայտնում է, որ կորել է անչափահաս երեխա։ Պարեկի գործողությունը պետք է լինի՝", options: ["Անտեսել տեղեկությունը", "Սպասել գրավոր դիմումի", "Ձեռնարկել համապատասխան միջոցներ սահմանված կարգով", "Ուղարկել քաղաքացուն տուն"], answer: 2 },
      { q: "Համաձայն կանոնադրության 22-րդ կետի՝ մոնիթորինգի և վերլուծության հիմնական նպատակը հետևյալներից ո՞րն է։", options: ["Տուգանքների թվի ավելացումը", "Ծառայության արդյունավետության գնահատումն ու վերլուծությունը", "Դատական որոշումների ընդունումը", "Քրեական վարույթի իրականացումը"], answer: 1 },
      { q: "Համաձայն կանոնադրության 17-րդ կետի՝ ծառայողների նկատմամբ Պարեկային ծառայության պետը կարող է կիրառել՝", options: ["Քրեական պատիժներ", "Դատական տույժեր", "Խրախուսանքներ և կարգապահական տույժեր", "Քաղաքացիական պատասխանատվություն"], answer: 2 },
      { q: "Համաձայն կանոնադրության 10-րդ կետի՝ մարդու իրավունքների և ազատությունների պաշտպանությունը հանդիսանում է՝", options: ["Պարեկային ծառայության խնդիրներից մեկը", "Միայն դատարանի գործառույթ", "Միայն ՄԻՊ-ի գործառույթ", "Միայն քննիչի գործառույթ"], answer: 0 },
      { q: "Համաձայն կանոնադրության 29-րդ կետի՝ պարեկը նկատում է, որ խաչմերուկում խափանվել է լուսացույցը։ Նրա հիմնական նպատակը պետք է լինի՝", options: ["Տուգանել վարորդներին", "Սպասել այլ ծառայության ժամանմանը", "Տեղեկություն հավաքել հաշվետվության համար", "Ապահովել երթևեկության անվտանգությունը"], answer: 3 },

      { q: "Համաձայն կանոնադրության 10-րդ կետի՝ հանցագործությունների և իրավախախտումների բացահայտման նպատակը հետևյալներից ո՞րն է։", options: ["Տուգանքների թվի ավելացումը", "Քաղաքացիների վերահսկողության ուժեղացումը", "Իրավակարգի և հասարակական անվտանգության ապահովումը", "Վիճակագրության բարելավումը"], answer: 2 },
      { q: "Համաձայն կանոնադրության 9-րդ կետի՝ Պարեկային ծառայության գործունեության վերջնական նպատակը հետևյալներից ո՞րն է։", options: ["Անվտանգ, իրավակարգ և պաշտպանված հասարակության ապահովումը", "Տուգանքների քանակի ավելացումը", "Վարչական վարույթների թվի աճը", "Հաշվետվությունների թվի ավելացումը"], answer: 0 }
    ];

    const letters = ["ա", "բ", "գ", "դ"];
    const form = document.getElementById("quizForm");
    const selectedAnswers = Array(questions.length).fill(null);

    questions.forEach((item, index) => {
      const box = document.createElement("div");
      box.className = "question";
      box.id = "question-" + index;

      const title = document.createElement("h3");
      title.textContent = (index + 1) + ". " + item.q;
      box.appendChild(title);

      item.options.forEach((opt, optIndex) => {
        const option = document.createElement("label");
        option.className = "option";
        option.setAttribute("data-question", index);
        option.setAttribute("data-option", optIndex);

        const input = document.createElement("input");
        input.type = "radio";
        input.name = "q" + index;
        input.value = optIndex;

        const span = document.createElement("span");
        span.textContent = letters[optIndex] + ") " + opt;

        option.appendChild(input);
        option.appendChild(span);

        option.addEventListener("click", function() {
          selectedAnswers[index] = optIndex;
          input.checked = true;
          document.querySelectorAll('.option[data-question="' + index + '"]').forEach(el => el.classList.remove("selected"));
          option.classList.add("selected");
        });

        input.addEventListener("change", function() {
          selectedAnswers[index] = optIndex;
        });

        box.appendChild(option);
      });

      form.appendChild(box);
    });

    function submitQuiz() {
      const firstName = document.getElementById("firstName").value.trim();
      const lastName = document.getElementById("lastName").value.trim();
      const platoon = document.getElementById("platoon").value.trim();

      if (!firstName || !lastName || !platoon) {
        alert("Խնդրում ենք լրացնել անունը, ազգանունը և դասակը։");
        return;
      }

      let missing = [];
      for (let i = 0; i < questions.length; i++) {
        if (selectedAnswers[i] === null) missing.push(i + 1);
      }

      if (missing.length > 0) {
        alert("Դուք չեք պատասխանել բոլոր հարցերին։ Չպատասխանված հարցեր՝ " + missing.join(", "));
        document.getElementById("question-" + (missing[0] - 1)).scrollIntoView({ behavior: "smooth", block: "center" });
        return;
      }

      let score = 0;

      questions.forEach((item, index) => {
        const labels = document.querySelectorAll('.option[data-question="' + index + '"]');
        labels.forEach(label => label.classList.remove("correct", "wrong", "selected"));

        const selectedIndex = selectedAnswers[index];

        if (selectedIndex === item.answer) {
          score++;
          labels[selectedIndex].classList.add("correct");
        } else {
          labels[selectedIndex].classList.add("wrong");
          labels[item.answer].classList.add("correct");
        }
      });

      const total = questions.length;
      const percent = Math.round((score / total) * 100);
      const passed = score >= 32;
      const fullName = (firstName + " " + lastName).trim();

      const result = document.getElementById("result");
      result.style.display = "block";
      result.innerHTML =
        "<strong>Անուն Ազգանուն՝</strong> " + fullName + "<br>" +
        "<strong>Դասակ՝</strong> " + platoon + "<br>" +
        "<strong>Միավոր՝</strong> " + score + "<br>" +
        "<strong>Ընդհանուր՝</strong> " + total + "<br>" +
        "<strong>Տոկոս՝</strong> " + percent + "%<br>" +
        "<strong>Կարգավիճակ՝</strong> <span class='" + (passed ? "pass" : "fail") + "'>" + (passed ? "Հաղթահարված" : "Չի հաղթահարվել") + "</span><br>" +
        "<br>Կանաչով նշված են ճիշտ պատասխանները, կարմիրով՝ սխալ ընտրված պատասխանները։<br><br>" +
        "<span id='sendStatus'>" + (SCRIPT_URL ? "Արդյունքը ուղարկվում է..." : "Google Sheets հղումը դեռ տեղադրված չէ։ Արդյունքը ցուցադրվեց միայն այս էջում։") + "</span>";

      const payload = {
        fillDate: new Date().toISOString(),
        firstName,
        lastName,
        platoon,
        score,
        total,
        percent
      };

      const submitBtn = document.getElementById("submitBtn");
      submitBtn.disabled = true;

      if (SCRIPT_URL) {
        const status = document.getElementById("sendStatus");
        fetch(SCRIPT_URL, {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        })
        .then(() => {
          status.textContent = "Արդյունքը ուղարկվեց։";
        })
        .catch(() => {
          status.textContent = "Չհաջողվեց ուղարկել արդյունքը։ Ստուգեք ինտերնետը կամ Apps Script կարգավորումները։";
          submitBtn.disabled = false;
        });
      }

      result.scrollIntoView({ behavior: "smooth", block: "center" });
    }
  </script>
</body>
</html>
